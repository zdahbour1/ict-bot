version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ict_bot
      POSTGRES_USER: ict_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ict_bot_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ict_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Trading Bot (optional — use profiles: with-bot) ─────
  # Run locally for best IB connectivity, or enable with:
  #   docker compose --profile with-bot up
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DATABASE_URL: postgresql://ict_bot:${POSTGRES_PASSWORD:-ict_bot_dev}@postgres:5432/ict_bot
      USE_IB: "true"
      IB_HOST: ${IB_HOST:-host.docker.internal}
      IB_PORT: ${IB_PORT:-7497}
      IB_CLIENT_ID: ${IB_CLIENT_ID:-1}
      IB_ACCOUNT: ${IB_ACCOUNT:-}
      DRY_RUN: ${DRY_RUN:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - with-bot

  # ── Dashboard API (FastAPI) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://ict_bot:${POSTGRES_PASSWORD:-ict_bot_dev}@postgres:5432/ict_bot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (nginx + React build) ──────────────────────
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
