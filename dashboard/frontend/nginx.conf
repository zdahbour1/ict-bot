server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy (no caching)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Socket.IO proxy
    location /socket.io/ {
        proxy_pass http://api:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Hashed JS/CSS bundles — safe to cache forever, hash changes on rebuild
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — NEVER cache. It references hashed bundles by name and
    # MUST be revalidated every load, or browsers pin to a stale bundle.
    # Root cause of the "drill-down still not working after rebuild" bug:
    # browser kept loading the old index.html pointing at the old JS hash
    # even after we rebuilt the frontend with the fix.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # SPA fallback (also forbids caching the rewritten index.html)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri $uri/ /index.html;
    }
}
