[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
markers =
    unit: Pure logic tests (no DB, no IB, no network) — fast
    integration: Tests that require PostgreSQL
    e2e: End-to-end tests with full system
    slow: Tests that take >1 second
    concurrency: Race-condition and concurrency stress tests
    bug: Tests that reproduce a specific bug (use bug_ref marker)
timeout = 30
asyncio_mode = auto
